          action.action();
        });
        actions.appendChild(btn);
      });
      overlay.classList.add("show");
    }

    function closeBattleOverlay() {
      const overlay = document.getElementById("battleOverlay");
      overlay.classList.remove("show", "boss-battle");
      overlay.setAttribute("aria-hidden", "true");
      document.getElementById("battleCard").innerHTML = "";
    }

    function showResultModal(title, html, actions) {
      const modal = document.getElementById("modal");
      modal.innerHTML = `<h2>${title}</h2><div class="feedback">${html}</div><div class="button-row" style="margin-top:14px;"></div>`;
      const row = modal.querySelector(".button-row");
      actions.forEach(action => {
        const btn = document.createElement("button");
        btn.className = "primary-btn";
        btn.textContent = action.text;
        btn.addEventListener("click", action.action);
        row.appendChild(btn);
      });
      document.getElementById("modalBackdrop").classList.add("show");
    }

    function showConfirmRestart() {
      showResultModal("重新开始", "重新开始会回到开始界面，并恢复生命为 5。", [
        { text: "确认重新开始", action: () => { closeBattleOverlay(); resetToStart(); } },
        { text: "继续游戏", action: () => closeModal() }
      ]);
    }

    function resetToStart() {
      closeModal();
      closeBattleOverlay();
      gameState.screen = "start";
      gameState.selectedCharacter = null;
      gameState.levelIndex = 0;
      gameState.lives = 5;
      gameState.currentNumber = 1;
      gameState.targetNumber = 0;
      gameState.steps = 0;
      gameState.map = [];
      gameState.monsters = [];
      gameState.hiddenPath = [];
      gameState.operationHistory = [];
      gameState.levelResults = [];
      gameState.usedQuestionIds = [];
      gameState.pendingEncounter = null;
      gameState.debugVisible = false;
      gameState.rulesVisible = false;
      gameState.historyExpanded = false;
      bossState.active = false;
      bossState.question = null;
      bossState.answered = false;
      bossState.attempts = 0;
      document.querySelectorAll(".character-card").forEach(card => card.classList.remove("selected"));
      render();
    }

    function closeModal() {
      document.getElementById("modalBackdrop").classList.remove("show");
      document.getElementById("modal").innerHTML = "";
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function flashElement(id, className) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.remove(className);
      void el.offsetWidth;
      el.classList.add(className);
      setTimeout(() => el.classList.remove(className), 520);
    }

    function handleKeyDown(e) {
      const map = {
        ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right",
        w: "up", W: "up", s: "down", S: "down", a: "left", A: "left", d: "right", D: "right"
      };
      if (map[e.key]) {
        e.preventDefault();
        handleDirectionInput(map[e.key], "keyboard");
      }
    }

    function calcOperation(num, op, value) {
      if (op === "+") return num + value;
      if (op === "-") return num - value;
      if (op === "×") return num * value;
      if (op === "÷") return num / value;
      return num;
    }

    function randomDistractorOperation(context = "initial") {
      if (gameState.levelIndex === 0) return randomFriendlyOperation(context);
      const roll = Math.random();
      if (gameState.levelIndex === 2) {
        if (roll < 0.3) return buildUsefulDistractor(context);
        if (roll < 0.78) return buildPlausibleDistractor(context);
        return buildCorrectionDistractor(context);
      }
      if (roll < 0.4) return buildUsefulDistractor(context);
      if (roll < 0.8) return buildPlausibleDistractor(context);
      return buildCorrectionDistractor(context);
    }

    function randomFriendlyOperation(context) {
      const current = Math.max(1, gameState.currentNumber || 1);
      const choices = [
        { op: "+", value: randInt(3, 10) },
        { op: "+", value: randInt(5, 12) },
        { op: "×", value: randomItem([2, 2, 3]) }
      ];
      if (current > 5) choices.push({ op: "-", value: randInt(1, Math.min(4, current - 1)) });
      if (current % 2 === 0 && current > 2 && Math.random() < 0.25) choices.push({ op: "÷", value: 2 });
      return randomItem(choices);
    }

    function buildUsefulDistractor(context) {
      const target = gameState.targetNumber || 60;
      const factors = [2, 3, 4, 5].filter(n => target % n === 0);
      const choices = [
        { op: "+", value: clamp(randInt(Math.max(4, Math.floor(target / 8)), Math.max(8, Math.floor(target / 3))), 2, 24) },
        { op: "×", value: randomItem(factors.length ? factors : [2, 3, 4]) },
        { op: "÷", value: randomItem(factors.length ? factors : [2, 3]) }
      ];
      if (context === "replacement" && gameState.currentNumber > 8) choices.push({ op: "-", value: randInt(2, Math.min(12, gameState.currentNumber - 1)) });
      return randomItem(choices);
    }

    function buildPlausibleDistractor(context) {
      const target = gameState.targetNumber || 60;
      const near = Math.max(3, Math.floor(target / randInt(5, 9)));
      const choices = [
        { op: "+", value: clamp(near + randInt(-3, 5), 2, 22) },
        { op: "×", value: randomItem([2, 3, 4, 5]) },
        { op: "÷", value: randomItem([2, 3, 4, 5]) }
      ];
      if (context === "replacement" && gameState.currentNumber > 6) choices.push({ op: "-", value: randInt(1, Math.min(10, gameState.currentNumber - 1)) });
      if (context === "initial") choices.push({ op: "+", value: randInt(6, 18) });
      return randomItem(choices);
    }

    function buildCorrectionDistractor(context) {
      const target = gameState.targetNumber || 60;
      if (context === "replacement" && gameState.currentNumber > target) {
        return { op: "-", value: clamp(gameState.currentNumber - target + randInt(1, 6), 1, Math.max(1, gameState.currentNumber - 1)) };
      }
      if (context === "replacement" && gameState.currentNumber > 1 && gameState.currentNumber % 2 === 0 && Math.random() < 0.45) {
        return { op: "÷", value: 2 };
      }
      return randomItem([
        { op: "-", value: randInt(1, 5) },
        { op: "+", value: randInt(3, 12) },
        { op: "÷", value: randomItem([2, 3, 4]) }
      ]);
    }

    function findFreeCell(used) {
      const reachable = getReachableCells();
      const cells = [];
      for (let y = 1; y < gameState.map.length - 1; y++) {
        for (let x = 1; x < gameState.map.length - 1; x++) {
          if (gameState.map[y][x] === 0 && reachable.has(key(x, y)) && !used.has(key(x, y))) cells.push({ x, y });
        }
      }
      return cells.length ? randomItem(cells) : null;
    }

    function getReachableCells() {
      const start = gameState.player || { x: 1, y: 1 };
      const seen = new Set([key(start.x, start.y)]);
      const queue = [{ x: start.x, y: start.y }];
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      while (queue.length) {
        const cur = queue.shift();
        dirs.forEach(([dx, dy]) => {
          const nx = cur.x + dx;
          const ny = cur.y + dy;
          const k = key(nx, ny);
          if (insideMap(nx, ny) && gameState.map[ny][nx] === 0 && !seen.has(k)) {
            seen.add(k);
            queue.push({ x: nx, y: ny });
          }
        });
      }
      return seen;
    }

    function monsterAt(x, y) {
      return gameState.monsters.find(m => m.x === x && m.y === y);
    }

    function insideMap(x, y) {
      return y >= 0 && y < gameState.map.length && x >= 0 && x < gameState.map.length;
    }

    function key(x, y) {
      return `${x},${y}`;
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function hearts(n) {
      return "♥".repeat(Math.max(0, n)) + "♡".repeat(Math.max(0, 5 - n));
    }

    function formatOption(value) {
      return String(value);
    }

    function optionLabel(index) {
      return String.fromCharCode(65 + index);
    }

    function operationBadgeClass(op) {
      if (op === "+") return "op-add";
      if (op === "-") return "op-sub";
      if (op === "×") return "op-mul";
      if (op === "÷") return "op-div";
      return "op-add";
    }

    function avatarHtml(ch, fallback) {
      if (!ch) return fallback;
      return `<img src="${ch.img}" alt="${ch.name}" onerror="this.remove(); this.parentNode.textContent='${fallback}';">`;
    }

    function monsterAvatarHtml(idle = false, seed = 0) {
      const delay = idle ? ` style="animation-delay:${((Number(seed) || 0) % 1800 / 1000).toFixed(2)}s"` : "";
      const idleClass = idle ? " monster-avatar-idle" : "";
      return `<div class="monster-avatar${idleClass}"${delay}><img src="monster.png" alt="怪物" onerror="this.remove(); this.parentNode.textContent='怪';"></div>`;
    }

    function doorAvatarHtml() {
      return `<div class="door-avatar"><img src="door.png" alt="出口" onerror="this.remove(); this.parentNode.classList.add('door-fallback');"></div>`;
    }

    initGame();
  </script>
</body>
</html>
